<div class="container">
    <div class="d-block mb-3">
        <a [routerLink]="'/admin/add-category'">Add Category</a>
    </div>
</div>
@if (isLoading()) {
Loading...
} @else if(isError()) {
Error loading categories.
} @else {
<!-- content starts -->
<div class="container">
    <div class="row">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th scope="col">id</th>
                    <th scope="col">Name</th>
                    <th scope="col">Url Handle</th>
                </tr>
            </thead>
            <tbody>
                @for(category of value(); track category.id) {
                    <tr>
                        <th scope="row">{{category.id}}</th>
                        <td>{{category.name}}</td>
                        <td>{{category.urlHandle}}</td>
                    </tr>
                }
            </tbody>
        </table>
    </div>
</div>
}
